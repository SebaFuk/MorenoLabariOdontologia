<!doctype html>
<html lang="es-AR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Página no encontrada — Moreno Labari Odontología</title>
  <meta name="robots" content="noindex" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap">

  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="stylesheet" href="styles.css" />

  <style>
    .page404 {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .page404-code {
      font-family: var(--font-head);
      font-size: clamp(80px, 18vw, 160px);
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }
    .page404-icon {
      font-size: 48px;
      margin-bottom: 20px;
    }
    .page404-title {
      font-family: var(--font-head);
      font-size: clamp(22px, 5vw, 32px);
      color: var(--text);
      margin-bottom: 12px;
    }
    .page404-desc {
      color: var(--muted);
      font-size: 15px;
      max-width: 400px;
      margin: 0 auto 32px;
      line-height: 1.6;
    }
    .page404-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body>

  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <div class="page404">
    <div class="page404-icon">🦷</div>
    <div class="page404-code">404</div>
    <h1 class="page404-title">Esta página no existe</h1>
    <p class="page404-desc">Parece que el enlace que seguiste ya no está disponible o fue movido. No te preocupes, podés volver al inicio.</p>
    <div class="page404-actions">
      <a class="btn primary" href="index.html">Volver al inicio</a>
      <a class="btn" href="index.html#turnos">Pedir un turno</a>
    </div>
  </div>

</body>
</html>
